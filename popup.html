<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: sans-serif; font-size: 13px; padding: 10px 14px; min-width: 200px; }
  label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
</style>
</head>
<body>
  <label>
    <input type="checkbox" id="smoothScroll">
    Force smooth scroll
  </label>
  <label style="margin-top: 6px;">
    <input type="checkbox" id="showIndicator" checked>
    Show position indicator
  </label>
  <div style="margin-top: 10px;">
    <div style="display:flex; justify-content:space-between; margin-bottom: 3px;">
      <span>Scroll offset</span>
      <span id="offsetLabel">20%</span>
    </div>
    <input type="range" id="offset" min="0" max="50" value="20" style="width:100%;">
  </div>
  <script src="popup.js"></script>
</body>
</html>
