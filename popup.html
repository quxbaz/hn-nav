<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: sans-serif; font-size: 13px; padding: 10px 14px; min-width: 200px; }
  label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .swatches { display: flex; gap: 7px; margin-top: 4px; }
  .swatch {
    width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; box-sizing: border-box;
  }
  .swatch.active { border-color: #333; }
</style>
</head>
<body>
  <label>
    <input type="checkbox" id="smoothScroll" checked>
    Force smooth scroll
  </label>
  <label style="margin-top: 6px;">
    <input type="checkbox" id="showIndicator" checked>
    Show position indicator
  </label>
  <div style="margin-top: 10px;">
    <div style="margin-bottom: 4px;">Indicator color</div>
    <div class="swatches">
      <div class="swatch" data-color="#ff6600" style="background:#ff6600"></div>
      <div class="swatch" data-color="#e8232a" style="background:#e8232a"></div>
      <div class="swatch" data-color="#1a6ef5" style="background:#1a6ef5"></div>
      <div class="swatch" data-color="#0db050" style="background:#0db050"></div>
      <div class="swatch" data-color="#8b2be2" style="background:#8b2be2"></div>
      <div class="swatch" data-color="#f0c000" style="background:#f0c000"></div>
      <div class="swatch" data-color="#00b0c8" style="background:#00b0c8"></div>
      <div class="swatch" data-color="#f0177e" style="background:#f0177e"></div>
      <div class="swatch" data-color="#5db800" style="background:#5db800"></div>
    </div>
  </div>
  <div style="margin-top: 10px;">
    <div style="display:flex; justify-content:space-between; margin-bottom: 3px;">
      <span>Scroll offset</span>
      <span id="offsetLabel">20%</span>
    </div>
    <input type="range" id="offset" min="0" max="50" value="20" style="width:100%;">
  </div>
  <div style="margin-top: 10px;">
    <div style="display:flex; justify-content:space-between; margin-bottom: 3px;">
      <span>Scroll speed</span>
      <span id="scrollSpeedLabel">5</span>
    </div>
    <input type="range" id="scrollSpeed" min="1" max="10" value="5" style="width:100%;">
  </div>
  <div style="margin-top: 10px; border-top: 1px solid #e8e8e8; padding-top: 10px;">
    <div style="margin-bottom: 5px;">AI Summary <span style="color:#aaa">(q)</span></div>
    <label>
      <input type="radio" name="aiBackend" id="backendGemini" value="gemini">
      Gemini API
    </label>
    <label style="margin-top: 3px;">
      <input type="radio" name="aiBackend" id="backendNano" value="nano">
      On-device (Nano)
    </label>
    <div id="apiKeySection" style="margin-top: 6px;">
      <input type="password" id="geminiApiKey" placeholder="API key"
             style="width:100%; box-sizing:border-box; font-size:12px; padding:3px 6px; border:1px solid #ccc; border-radius:3px;">
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
